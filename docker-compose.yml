version: '3.8'

services:
  # Base de datos MySQL
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./BaseDatos.sql:/docker-entrypoint-initdb.d/BaseDatos.sql
    networks:
      - app-network
    restart: unless-stopped

  # Servicio de Clientes
  clientes-service:
    build:
      context: ./clientes
      dockerfile: Dockerfile
    container_name: clientes-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQL8Dialect
    ports:
      - "8081:8081"
    depends_on:
      - mysql
    networks:
      - app-network
    restart: unless-stopped

  # Servicio de Cuentas
  cuentas-service:
    build:
      context: ./cuentas
      dockerfile: Dockerfile
    container_name: cuentas-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQL8Dialect
      CLIENTES_SERVICE_URL: http://clientes-service:8081
    ports:
      - "8082:8082"
    depends_on:
      - mysql
      - clientes-service
    networks:
      - app-network
    restart: unless-stopped

  # Frontend Angular Application
  bank-frontend:
    build:
      context: ./bank-frontend
      dockerfile: Dockerfile
    container_name: bank-frontend
    ports:
      - "80:80"
    depends_on:
      - clientes-service
      - cuentas-service
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
